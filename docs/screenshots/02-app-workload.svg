<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-label="Example: kubectl get all in demo namespace">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .title { fill: #8b949e; font: 12px ui-monospace, monospace; }
      .dollar { fill: #58a6ff; font: 13px ui-monospace, monospace; }
      .cmd { fill: #c9d1d9; font: 13px ui-monospace, monospace; }
      .row { fill: #c9d1d9; font: 11px ui-monospace, monospace; }
      .border { fill: none; stroke: #30363d; stroke-width: 1; }
    </style>
  </defs>
  <rect width="900" height="240" class="bg" rx="10"/>
  <rect x="0.5" y="0.5" width="899" height="239" class="border" rx="10"/>
  <text x="24" y="32" class="title">Evidence: app deployed  Deployment, Pods, Services, Ingress</text>
  <text x="24" y="60" class="dollar">$</text>
  <text x="44" y="60" class="cmd">kubectl -n demo get deploy,po,svc,ingress</text>
  <text x="24" y="92" class="row">NAME                           READY   UP-TO-DATE   AVAILABLE</text>
  <text x="24" y="108" class="row">deployment.apps/java-war       1/1     1            1</text>
  <text x="24" y="136" class="row">NAME                               READY   STATUS    RESTARTS</text>
  <text x="24" y="152" class="row">pod/java-war-xxxx                  1/1     Running   0</text>
  <text x="24" y="180" class="row">NAME                          TYPE        CLUSTER-IP    PORT(S)</text>
  <text x="24" y="196" class="row">service/java-war-svc          ClusterIP   10.x.x.x      8080/TCP</text>
  <text x="24" y="212" class="row">service/java-war-svc-nodeport NodePort    10.x.x.x      8080:30080/TCP</text>
  <text x="24" y="228" class="row">ingress.networking.../java-war-ingress   java.demo.local  80</text>
</svg>
